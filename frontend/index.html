<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Market Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
            padding: 30px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        .input-box {
            margin-bottom: 20px;
        }

        input {
            padding: 12px;
            border-radius: 10px;
            border: none;
            width: 250px;
            font-size: 16px;
        }

        button {
            padding: 12px 20px;
            margin-left: 10px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            opacity: 0.9;
        }

        .row {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            flex: 1;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            text-align: center;
            font-size: 18px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .chart-box {
            flex: 1;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
        }

        canvas {
            width: 100% !important;
            height: 300px !important;
        }

        ul {
            margin-top: 20px;
            line-height: 1.8;
        }
    </style>
</head>

<body>

<h1>📊 Market Dashboard</h1>

<div class="input-box">
    <input id="sector" placeholder="Enter sector (technology)">
    <button onclick="analyze()">Analyze</button>
</div>

<!-- METRICS -->
<div class="row">
    <div class="card" id="growth">Growth: --</div>
    <div class="card" id="risk">Risk: --</div>
    <div class="card" id="demand">Demand: --</div>
</div>

<!-- CHARTS -->
<div class="row">
    <div class="chart-box">
        <canvas id="barChart"></canvas>
    </div>
    <div class="chart-box">
        <canvas id="lineChart"></canvas>
    </div>
</div>

<!-- INSIGHTS -->
<ul id="insights"></ul>

<script>
let barChart, lineChart;

async function analyze() {
    const sector = document.getElementById("sector").value.trim();

    if (!sector) {
        alert("Enter sector!");
        return;
    }

    try {
        console.log("Calling backend...");

        const res = await fetch(`http://127.0.0.1:8000/analyze/${sector}`);

        if (!res.ok) {
            throw new Error("Server not responding");
        }

        const data = await res.json();
        console.log("Response:", data);

        if (data.error) {
            alert(data.error);
            return;
        }

        // -------- METRICS --------
        const g = Number(data.growth) || 0;
        const r = Number(data.risk) || 0;
        const d = Number(data.demand) || 0;

        document.getElementById("growth").innerText = "Growth: " + g;
        document.getElementById("risk").innerText = "Risk: " + r;
        document.getElementById("demand").innerText = "Demand: " + d;

        // destroy old charts
        if (barChart) barChart.destroy();
        if (lineChart) lineChart.destroy();

        // -------- BAR CHART --------
        barChart = new Chart(document.getElementById("barChart"), {
            type: "bar",
            data: {
                labels: ["Growth", "Risk", "Demand"],
                datasets: [{
                    label: "Market Score",
                    data: [g, r, d],
                    backgroundColor: ["#22c55e", "#3b82f6", "#06b6d4"]
                }]
            },
            options: {
                plugins: {
                    legend: { display: false }
                }
            }
        });

        // -------- LINE CHART --------
        lineChart = new Chart(document.getElementById("lineChart"), {
            type: "line",
            data: {
                labels: data.trend_dates,
                datasets: [{
                    label: "Stock Price",
                    data: data.trend_prices,
                    borderColor: "#38bdf8",
                    backgroundColor: "rgba(56,189,248,0.2)",
                    fill: true,
                    tension: 0.4
                }]
            }
        });

        // -------- INSIGHTS --------
        const ul = document.getElementById("insights");
        ul.innerHTML = "";

        if (data.insights) {
            data.insights.forEach(i => {
                const li = document.createElement("li");
                li.innerText = i;
                ul.appendChild(li);
            });
        }

    } catch (err) {
        console.error("ERROR:", err);
        alert("❌ Cannot connect to backend.\n\nCheck:\n1. Backend running\n2. CORS enabled\n3. Correct URL");
    }
}
</script>

</body>
</html>
